<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PVC File Browser</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<!-- ─── Login Page ──────────────────────────────────────────────────────────── -->
<div id="login-page" class="login-page hidden">
  <div class="login-card">
    <div class="login-logo" id="login-logo-wrap">
      <!-- Logo injected by JS -->
    </div>
    <h1 class="login-company" id="login-company-name">File Browser</h1>
    <p class="login-sub">Sign in to access your files</p>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" name="username" autocomplete="username" required placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Enter password" />
      </div>
      <div id="login-error" class="login-error hidden"></div>
      <button type="submit" class="btn-gradient w-full">Sign In</button>
    </form>
  </div>
</div>

<!-- ─── Main App ────────────────────────────────────────────────────────────── -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo" id="sidebar-logo"></div>
      <span class="sidebar-company" id="sidebar-company"></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="browser" title="Files">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Files</span>
      </button>
      <button class="nav-item" data-view="s3" title="S3 Storage">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <span>S3 Storage</span>
      </button>
      <button class="nav-item" data-view="system" title="System Info">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span>System</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-item" id="logout-btn" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- File Browser View -->
    <div id="view-browser" class="view">
      <!-- Volume tabs (hidden when only one volume) -->
      <div id="volume-tabs" class="volume-tabs hidden"></div>

      <div class="toolbar">
        <div class="breadcrumb-wrap">
          <nav class="breadcrumb" id="breadcrumb"></nav>
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-sm" id="btn-select-all" title="Select all / Deselect all">☑ Select All</button>
          <button class="btn btn-icon" id="btn-list-view" title="List view">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
          <button class="btn btn-icon" id="btn-grid-view" title="Grid view">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="btn" id="btn-new-folder">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 2h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            New Folder
          </button>
          <button class="btn btn-gradient" id="btn-upload">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
            Upload
          </button>
        </div>
      </div>

      <!-- Multi-select bar -->
      <div class="selection-bar hidden" id="selection-bar">
        <span id="selection-count">0 selected</span>
        <button class="btn btn-sm" id="btn-sel-download">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Download
        </button>
        <button class="btn btn-sm" id="btn-sel-move">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 9 2 12 5 15"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
          Move
        </button>
        <button class="btn btn-sm" id="btn-sel-copy">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="btn btn-sm" id="btn-sel-perms">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Permissions
        </button>
        <button class="btn btn-sm btn-danger" id="btn-sel-delete">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Delete
        </button>
        <button class="btn btn-sm" id="btn-sel-clear">✕ Clear</button>
      </div>

      <!-- Drop zone -->
      <div class="drop-overlay hidden" id="drop-overlay">
        <div class="drop-overlay-inner">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
          <p>Drop files here to upload</p>
        </div>
      </div>

      <!-- File container -->
      <div class="file-container" id="file-container">
        <div class="loading-spinner" id="file-loading">
          <div class="spinner"></div>
        </div>
        <div id="file-grid" class="file-grid hidden"></div>
        <div id="file-list" class="file-list hidden">
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" id="select-all" /></th>
                <th>Name</th>
                <th>Size</th>
                <th>Modified</th>
                <th>UID/GID</th>
                <th>Mode</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="file-list-body"></tbody>
          </table>
        </div>
        <div id="file-empty" class="file-empty hidden">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <p>This folder is empty</p>
          <button class="btn btn-gradient" id="btn-upload-empty">Upload files</button>
        </div>
      </div>

      <!-- Upload progress -->
      <div id="upload-progress-bar" class="upload-progress-bar hidden">
        <div class="upload-progress-inner">
          <span id="upload-progress-label">Uploading...</span>
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
          <span id="upload-progress-pct">0%</span>
        </div>
      </div>
    </div>

    <!-- S3 Browser View -->
    <div id="view-s3" class="view hidden">
      <div class="toolbar">
        <h2 class="view-title">S3 Storage</h2>
        <div class="toolbar-actions">
          <button class="btn btn-sm" id="btn-s3-flat" title="Toggle between folder tree and flat list of all keys">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Tree View
          </button>
          <button class="btn btn-sm" id="btn-s3-refresh" title="Refresh">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
            Refresh
          </button>
          <button class="btn" id="btn-s3-config">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
            Configure S3
          </button>
        </div>
      </div>
      <div class="s3-breadcrumb" id="s3-breadcrumb"></div>
      <div id="s3-not-configured" class="info-panel">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <p>S3 storage is not configured.</p>
        <button class="btn btn-gradient" id="btn-s3-config-2">Configure S3</button>
      </div>
      <div id="s3-error" class="s3-error-banner hidden"></div>
      <div id="s3-container" class="file-grid hidden"></div>
    </div>

    <!-- System Info View -->
    <div id="view-system" class="view hidden">
      <div class="toolbar"><h2 class="view-title">System Information</h2></div>
      <div class="system-info" id="system-info-content">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- ─── Context Menu ─────────────────────────────────────────────────────────── -->
<div id="context-menu" class="context-menu hidden"></div>

<!-- ─── Modal ───────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" id="modal-close">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ─── Toast ───────────────────────────────────────────────────────────────── -->
<div id="toast-container" class="toast-container"></div>

<!-- Hidden file inputs -->
<input type="file" id="file-input" multiple class="hidden" />
<input type="file" id="folder-input" multiple webkitdirectory class="hidden" />

<script src="/js/app.js"></script>
</body>
</html>
