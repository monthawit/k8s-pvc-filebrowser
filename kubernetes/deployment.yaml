apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app.kubernetes.io/name: k8s-pvc-filebrowser
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  strategy:
    type: Recreate            # Required because PVC is ReadWriteOnce
  template:
    metadata:
      labels:
        app: filebrowser
        app.kubernetes.io/name: k8s-pvc-filebrowser
    spec:
      # ── Security Context ────────────────────────────────────────────────
      # Remove runAsUser/runAsGroup for OpenShift (it assigns arbitrary UID)
      # Set runAsUser: 0 to enable chown/chmod features (requires privileges)
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: filebrowser
          image: registry.kubly.cloud/catalogs/k8s-pvc-filebrowser:v8
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            # From ConfigMap
            - name: COMPANY_NAME
              valueFrom:
                configMapKeyRef:
                  name: filebrowser-config
                  key: COMPANY_NAME
            - name: DATA_PATH
              valueFrom:
                configMapKeyRef:
                  name: filebrowser-config
                  key: DATA_PATH
            # Multi-volume support (uncomment and set VOLUMES in configmap):
            # - name: VOLUMES
            #   valueFrom:
            #     configMapKeyRef:
            #       name: filebrowser-config
            #       key: VOLUMES
            # From Secret
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: filebrowser-secret
                  key: APP_USERNAME
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filebrowser-secret
                  key: APP_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: filebrowser-secret
                  key: SESSION_SECRET
            # Optional S3 (uncomment if needed)
            # - name: S3_ENDPOINT
            #   valueFrom:
            #     configMapKeyRef:
            #       name: filebrowser-config
            #       key: S3_ENDPOINT
            # - name: S3_ACCESS_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: filebrowser-secret
            #       key: S3_ACCESS_KEY
            # - name: S3_SECRET_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: filebrowser-secret
            #       key: S3_SECRET_KEY
            # - name: S3_BUCKET
            #   valueFrom:
            #     configMapKeyRef:
            #       name: filebrowser-config
            #       key: S3_BUCKET
            # - name: S3_REGION
            #   valueFrom:
            #     configMapKeyRef:
            #       name: filebrowser-config
            #       key: S3_REGION
            # - name: S3_PATH_STYLE
            #   valueFrom:
            #     configMapKeyRef:
            #       name: filebrowser-config
            #       key: S3_PATH_STYLE
          volumeMounts:
            # ── Single volume (default) ───────────────────────────────────────
            - name: data
              mountPath: /data

            # ── Multi-volume example ──────────────────────────────────────────
            # Mount multiple PVCs at different paths.
            # Labels and paths must match the VOLUMES env var in configmap.
            # Example: VOLUMES=app1:/app1,data-01:/data-01
            #
            # - name: pvc-app1
            #   mountPath: /app1
            # - name: pvc-data-01
            #   mountPath: /data-01
            # ─────────────────────────────────────────────────────────────────
            # Optional: mount a custom logo
            # - name: logo
            #   mountPath: /app/public/logo.png
            #   subPath: logo.png
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/config
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/config
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: filebrowser-data
        # Multi-volume: add extra PVCs here
        # - name: pvc-app1
        #   persistentVolumeClaim:
        #     claimName: app1-pvc
        # - name: pvc-data-01
        #   persistentVolumeClaim:
        #     claimName: data-01-pvc
        # Optional: ConfigMap with custom logo
        # - name: logo
        #   configMap:
        #     name: filebrowser-logo

      restartPolicy: Always

---
# ── OpenShift / OKD Variant ──────────────────────────────────────────────────
# For OpenShift, remove runAsUser/runAsGroup/fsGroup from securityContext.
# For chown/chmod features, create a SCC that allows runAsUser: 0 and bind it:
#
#   oc adm policy add-scc-to-serviceaccount anyuid -z default -n filebrowser
#
# Then set:
#   securityContext:
#     runAsUser: 0
