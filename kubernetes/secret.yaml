apiVersion: v1
kind: Secret
metadata:
  name: filebrowser-secret
  namespace: filebrowser
  labels:
    app.kubernetes.io/name: k8s-pvc-filebrowser
type: Opaque
stringData:
  # ── Login credentials ─────────────────────────────────────────────────────
  APP_USERNAME: "admin"
  APP_PASSWORD: "changeme123"           # Change this!

  # ── Session ───────────────────────────────────────────────────────────────
  SESSION_SECRET: "replace-with-random-secret-string-min-32-chars"

  # ── S3 Credentials (optional) ─────────────────────────────────────────────
  # S3_ACCESS_KEY: "minioadmin"
  # S3_SECRET_KEY: "minioadmin"
